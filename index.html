<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INSCALE PRICE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="site-header">
        <div class="header-inner">
            <h1>INSCALE PRICE</h1>
            <p>Offline showroom price & product spec list</p>
        </div>
    </header>

    <main class="container">

        <section class="search-section">
            <input
                type="text"
                id="searchInput"
                placeholder="상품명, 브랜드, 디자이너, 소재 검색"
                autocomplete="off"
            >

            <div class="filter-row">
                <select id="brandFilter">
                    <option value="all">전체 브랜드</option>
                </select>

                <select id="categoryFilter">
                    <option value="all">전체 카테고리</option>
                </select>

                <select id="displayFilter">
                    <option value="all">전시 전체</option>
                    <option value="전시중">전시중</option>
                    <option value="미전시">미전시</option>
                    <option value="주문가능">주문가능</option>
                </select>
            </div>
        </section>

        <section class="result-summary">
            <span id="resultCount">0</span> products
        </section>

        <section id="productList" class="product-list"></section>

    </main>

    <script src="script.js"></script>
</body>
</html>
