<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INSCALE SHOWROOM PRICE</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">INSCALE SHOWROOM</p>
      <h1>PRICE & SPEC</h1>
    </div>
    <button id="resetBtn" class="reset-btn" type="button">초기화</button>
  </header>

  <main class="wrap">
    <section class="search-panel">
      <input id="searchInput" type="search" placeholder="상품명, 브랜드, 디자이너, 소재, 사이즈 검색" autocomplete="off" />

      <div class="filters">
        <select id="brandFilter">
          <option value="">전체 브랜드</option>
        </select>

        <select id="categoryFilter">
          <option value="">전체 카테고리</option>
        </select>

        <select id="displayFilter">
          <option value="">전시/상태 전체</option>
          <option value="전시중">전시중</option>
          <option value="미전시">미전시</option>
          <option value="주문가능">주문가능</option>
          <option value="확인필요">확인필요</option>
        </select>
      </div>

      <div class="summary">
        <span id="countText">불러오는 중...</span>
        <span class="hint">price.csv 파일을 교체하면 상품 데이터가 바뀝니다.</span>
      </div>
    </section>

    <section id="productList" class="product-list"></section>

    <section id="emptyState" class="empty-state" hidden>
      검색 결과가 없습니다.
    </section>
  </main>

  <footer class="footer">
    <p>INSCALE internal showroom price list</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
